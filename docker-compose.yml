version: "3.9"
services:

  jxmini-server:
    image: "jxwafmini:vdebug"
    ports:
      - "8088:80"
    environment:
      DBUSER: root
      DBNAME: jxwaf
      DBPASSWORD: jxwaf
      DBHOST: mariadb
      DBPORT: 3306
    restart: always

  mariadb:
    image: "mariadb:latest"
    environment:
      MARIADB_ROOT_PASSWORD: jxwaf
      MARIADB_DATABASE: jxwaf
    restart: always



